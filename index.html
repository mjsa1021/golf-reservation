<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경산시 골프 예약 센터</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f4; margin: 0; padding: 0; }
        .top-nav { background: #2e7d32; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-logo { font-size: 1.5rem; font-weight: bold; cursor: pointer; }
        .nav-menu span { margin-left: 15px; cursor: pointer; font-size: 0.9rem; opacity: 0.9; }
        .user-info { color: #ffeb3b; font-weight: bold; margin-right: 10px; }
        .center-content { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        /* 섹션 표시 제어 */
        .page-section { display: none; }
        .active { display: block; }

        .step-indicator { text-align: center; margin-bottom: 20px; font-weight: bold; color: #2e7d32; font-size: 1.2rem; }
        .calendar-header { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 20px; font-size: 1.8rem; font-weight: bold; }
        #current-month-display { min-width: 160px; text-align: center; }
        .calendar-container { background: #fff; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-label { font-weight: bold; padding: 10px; color: #666; text-align: center; }
        .day { padding: 20px 5px; border-radius: 10px; cursor: pointer; font-size: 1.4rem; font-weight: bold; border: 2px solid #eee; text-align: center; }
        .day.selected { background-color: #2e7d32; color: white; border-color: #1b5e20; }
        
        .time-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .time-btn { padding: 15px 10px; font-size: 1.2rem; border: 2px solid #ddd; border-radius: 12px; background: white; cursor: pointer; font-weight: bold; }
        .time-btn.active { background-color: #2e7d32; color: white; border-color: #1b5e20; }
        
        .big-label { font-size: 1.3rem; font-weight: bold; color: #333; display: block; margin: 20px 0 10px; }
        input, select { font-size: 1.2rem; padding: 15px; width: 100%; box-sizing: border-box; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 10px; }
        
        button { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { width: 100%; padding: 18px; font-size: 1.3rem; background: #2e7d32; color: white; }
        .btn-sub { width: 100%; padding: 15px; font-size: 1.1rem; border: 2px solid #2e7d32; background: #fff; color: #2e7d32; }
        
        .info-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .res-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .btn-cancel { padding: 8px 15px; background: #ff5252; color: white; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="nav-logo" onclick="goHome()">⛳ 경산 골프 예약</div>
        <div class="nav-menu">
            <span onclick="showInfo('notice')">공지사항</span>
            <span onclick="showInfo('board')">게시판</span>
            <span id="user-display-name" class="user-info"></span>
            <span id="logout-btn" onclick="handleLogout()" style="display:none; color:#ffeb3b;">로그아웃</span>
        </div>
    </header>

    <main class="center-content">
        <section id="auth-section" class="page-section active">
            <h1 style="text-align: center; font-size: 2.2rem; margin-bottom: 30px;">반갑습니다!</h1>
            <div class="info-card">
                <label class="big-label">아이디 (휴대폰)</label>
                <input type="text" id="user-id" placeholder="01012345678">
                <label class="big-label">비밀번호</label>
                <input type="password" id="user-pw" placeholder="비밀번호 입력">
                
                <div id="signup-extra" style="display: none;">
                    <label class="big-label">성함</label>
                    <input type="text" id="user-name">
                    <label class="big-label">생년월일 (8자리)</label>
                    <input type="text" id="user-birth" placeholder="예: 19650505">
                </div>

                <div style="margin-top: 20px;">
                    <button onclick="handleAuth()" id="btn-auth-main" class="btn-main">로그인 하기</button>
                    <button onclick="toggleSignup()" id="btn-signup-toggle" class="btn-sub" style="margin-top: 10px;">회원가입 하기</button>
                </div>
            </div>
        </section>

        <section id="reserve-section" class="page-section">
            <div id="step-1">
                <div class="step-indicator">1단계: 날짜 선택</div>
                <div class="calendar-container">
                    <div class="calendar-header">
                        <button onclick="changeMonth(-1)" style="background:none;">◀</button>
                        <span id="current-month-display"></span>
                        <button onclick="changeMonth(1)" style="background:none;">▶</button>
                    </div>
                    <div class="calendar-grid" id="calendar-grid"></div>
                </div>
                <button onclick="goToStep(2)" class="btn-main">다음 단계 ▶</button>
            </div>

            <div id="step-2" style="display: none;">
                <div class="step-indicator">2단계: 장소 및 시간</div>
                <label class="big-label">구장 선택</label>
                <select id="court">
                    <option value="경산 파크골프장">경산 파크골프장</option>
                    <option value="하양 파크골프장">하양 파크골프장</option>
                </select>
                <label class="big-label">시간 선택</label>
                <div class="time-btn-group">
                    <button class="time-btn" onclick="selectTime('09:00', this)">오전 (09~12시)</button>
                    <button class="time-btn" onclick="selectTime('13:00', this)">오후 (13~17시)</button>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 30px;">
                    <button onclick="goToStep(1)" style="flex: 1; background: #999;" class="btn-main">이전</button>
                    <button onclick="goToStep(3)" style="flex: 2;" class="btn-main">다음으로 ▶</button>
                </div>
            </div>

            <div id="step-3" style="display: none;">
                <div class="step-indicator">3단계: 최종 확인</div>
                <div id="final-check" class="info-card" style="border:2px dashed #2e7d32; line-height: 2; margin-bottom: 20px;"></div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="goToStep(2)" style="flex: 1; background: #999;" class="btn-main">이전</button>
                    <button onclick="reserve()" style="flex: 2; background: #e91e63;" class="btn-main">예약 완료 ✔️</button>
                </div>
            </div>

            <div class="info-card" style="margin-top: 30px;">
                <h3 style="color: #2e7d32; margin-top: 0;">나의 예약 목록</h3>
                <div id="my-res-list">로딩 중...</div>
            </div>
        </section>

        <section id="info-section" class="page-section">
            <h2 id="info-title" style="color: #2e7d32; border-bottom: 2px solid #2e7d32; padding-bottom: 10px;"></h2>
            <div id="info-body" class="info-card" style="min-height: 250px; margin-bottom: 20px;"></div>
            <button onclick="goHome()" class="btn-main" style="background: #666;">뒤로 가기</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
