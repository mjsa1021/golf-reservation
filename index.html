<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경산시 골프 예약 센터</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f4; margin: 0; padding: 0; }
        .top-nav { background: #2e7d32; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-logo { font-size: 1.5rem; font-weight: bold; cursor: pointer; }
        .nav-menu span { margin-left: 15px; cursor: pointer; font-size: 0.9rem; opacity: 0.9; }
        .user-info { color: #ffeb3b; font-weight: bold; margin-right: 10px; }
        
        .center-content { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        /* 메뉴 버튼 스타일 */
        .info-menu { display: none; gap: 10px; margin-bottom: 20px; }
        .info-menu button { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #fff; border: 1px solid #2e7d32; color: #2e7d32; font-weight: bold; cursor: pointer; }

        /* 섹션 제어 */
        .section { display: none; }
        .active { display: block; }

        /* 달력 및 카드 스타일 */
        .calendar-container, .auth-card, .info-card, .my-reservation-card { background: #fff; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day { padding: 20px 5px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; border: 1px solid #eee; text-align: center; }
        .day.selected { background-color: #2e7d32 !important; color: white !important; }
        .day.disabled { color: #ccc; cursor: not-allowed; }
        .day.today { border: 2px solid #2e7d32; color: #2e7d32; }

        .time-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .time-btn { padding: 15px; font-size: 1.2rem; border: 2px solid #ddd; border-radius: 12px; background: white; cursor: pointer; font-weight: bold; }
        .time-btn.active { background-color: #2e7d32; color: white; border-color: #1b5e20; }

        input, select { font-size: 1.1rem; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 10px; border: 1px solid #ccc; margin-top: 5px; }
        .big-label { font-size: 1.2rem; font-weight: bold; color: #333; display: block; margin-top: 15px; }
        
        button.primary-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; background: #2e7d32; color: white; margin-top: 10px; }
        button.secondary-btn { width: 100%; padding: 15px; border: 2px solid #2e7d32; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; background: #fff; color: #2e7d32; }
        
        .res-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .btn-cancel { padding: 8px 12px; background: #ff5252; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="nav-logo" onclick="goHome()">⛳ 경산시 골프 센터</div>
        <div class="nav-menu">
            <span id="user-display-name" class="user-info"></span>
            <span id="logout-btn" onclick="handleLogout()" style="display:none; color:#ffeb3b;">로그아웃</span>
        </div>
    </header>

    <main class="center-content">
        <div id="main-info-menu" class="info-menu">
            <button onclick="showSection('info-notice')">📢 공지사항</button>
            <button onclick="showSection('info-guide')">📖 이용안내</button>
            <button onclick="showSection('reserve-section')" style="background:#2e7d32; color:#fff;">🗓️ 예약하기</button>
        </div>

        <div id="auth-section" class="section active">
            <h1 style="text-align: center;">반갑습니다!</h1>
            <div class="auth-card">
                <label class="big-label">아이디</label>
                <input type="text" id="user-id" placeholder="휴대폰번호 입력">
                <label class="big-label">비밀번호</label>
                <input type="password" id="user-pw" placeholder="비밀번호 입력">
                
                <div id="signup-extra" style="display: none;">
                    <label class="big-label">성함</label>
                    <input type="text" id="user-name">
                    <label class="big-label">연락처</label>
                    <input type="text" id="user-tel" placeholder="010-1234-5678">
                </div>
                <div style="margin-top: 20px;">
                    <button onclick="toggleSignup()" id="btn-signup-toggle" class="secondary-btn">회원가입</button>
                    <button onclick="handleAuth()" id="btn-auth-main" class="primary-btn">로그인 하기</button>
                </div>
            </div>
        </div>

        <div id="info-notice" class="section">
            <div class="info-card">
                <h2>📢 공지사항</h2>
                <hr>
                <p>• 경산 파크골프장 잔디 보호를 위한 휴장 안내 (4월 말)</p>
                <p>• 이용 시간 준수 및 개인 장비 지참 필수</p>
                <p>• 예약은 1인당 하루 1타임만 가능합니다.</p>
                <button onclick="showSection('reserve-section')" class="primary-btn">확인했습니다</button>
            </div>
        </div>

        <div id="info-guide" class="section">
            <div class="info-card">
                <h2>📖 이용안내</h2>
                <hr>
                <p><b>운영시간:</b> 09:00 ~ 18:00</p>
                <p><b>이용요금:</b> 경산시민 2,000원 / 타지역 5,000원</p>
                <p><b>준수사항:</b> 운동화 및 간편복 착용 필수</p>
                <button onclick="showSection('reserve-section')" class="primary-btn">예약하러 가기</button>
            </div>
        </div>

        <div id="reserve-section" class="section">
            <div id="step-1">
                <div class="calendar-container">
                    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
                        <button onclick="changeMonth(-1)">◀</button>
                        <h2 id="current-month-display" style="margin:0;"></h2>
                        <button onclick="changeMonth(1)">▶</button>
                    </div>
                    <div class="calendar-grid" id="calendar-grid"></div>
                </div>
                <button onclick="goToStep(2)" class="primary-btn">다음 단계 ▶</button>
            </div>

            <div id="step-2" style="display: none;">
                <div class="info-card">
                    <label class="big-label">구장 선택</label>
                    <select id="course_no">
                        <option value="1">경산 파크골프장</option>
                        <option value="2">하양 파크골프장</option>
                    </select>
                    <label class="big-label">시간 선택</label>
                    <div class="time-btn-group">
                        <button class="time-btn" onclick="selectTime('09:00:00', this)">오전 (09:00~)</button>
                        <button class="time-btn" onclick="selectTime('14:00:00', this)">오후 (14:00~)</button>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="goToStep(1)" style="background: #999;" class="primary-btn">이전</button>
                    <button onclick="goToStep(3)" class="primary-btn">확인 ▶</button>
                </div>
            </div>

            <div id="step-3" style="display: none;">
                <div id="final-check" class="info-card" style="border: 2px solid #2e7d32;"></div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="goToStep(2)" style="background: #999;" class="primary-btn">수정</button>
                    <button onclick="reserve()" style="background: #e91e63;" class="primary-btn">예약 완료 ✔️</button>
                </div>
            </div>

            <div class="my-reservation-card">
                <h3 style="margin-top: 0; color: #2e7d32;">나의 예약 내역</h3>
                <div id="my-res-list">조회 중...</div>
            </div>
        </div>
    </main>

    <script>
        const _supabase = supabase.createClient('https://cxihknkegqjllaetliui.supabase.co', 'sb_publishable_GPYrYSU37rxlEG0DpKDFgA_oTwChTDK');
        let isSignupMode = false;
        let selDate = "";
        let selTime = "";
        let currentMonth = new Date();

        window.onload = function() {
            const memNo = localStorage.getItem('mem_no');
            if (memNo) showReserveSection(localStorage.getItem('mem_name'));
        };

        // 섹션 전환 함수
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            window.scrollTo(0, 0);
        }

        /* --- 인증 --- */
        function toggleSignup() {
            isSignupMode = !isSignupMode;
            document.getElementById('signup-extra').style.display = isSignupMode ? 'block' : 'none';
            document.getElementById('btn-auth-main').innerText = isSignupMode ? '가입 완료' : '로그인';
        }

        async function handleAuth() {
            const id = document.getElementById('user-id').value.trim();
            const pw = document.getElementById('user-pw').value.trim();
            if (!id || !pw) return alert("입력 정보를 확인해주세요.");

            if (isSignupMode) {
                const name = document.getElementById('user-name').value;
                const tel = document.getElementById('user-tel').value;
                const { error } = await _supabase.from('member').insert([{ mem_id: id, mem_pw: pw, mem_name: name, mem_tel: tel }]);
                if (error) alert("가입 실패"); else { alert("가입 성공! 로그인 하세요."); location.reload(); }
            } else {
                const { data } = await _supabase.from('member').select('*').eq('mem_id', id).eq('mem_pw', pw).single();
                if (data) {
                    localStorage.setItem('mem_no', data.mem_no);
                    localStorage.setItem('mem_name', data.mem_name);
                    showReserveSection(data.mem_name);
                } else alert("로그인 정보가 틀립니다.");
            }
        }

        function showReserveSection(name) {
            document.getElementById('user-display-name').innerText = name + " 님";
            document.getElementById('logout-btn').style.display = 'inline';
            document.getElementById('main-info-menu').style.display = 'flex';
            showSection('reserve-section');
            initCalendar();
            fetchMyReservations();
        }

        function handleLogout() { localStorage.clear(); location.reload(); }
        function goHome() { location.reload(); }

        /* --- 달력/예약 --- */
        function initCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            document.getElementById('current-month-display').innerText = `${year}년 ${month + 1}월`;
            ['일','월','화','수','목','금','토'].forEach(d => {
                const el = document.createElement('div'); el.style.fontWeight='bold'; el.style.textAlign='center'; el.innerText = d; grid.appendChild(el);
            });
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const today = new Date(); today.setHours(0,0,0,0);
            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
            for(let i=1; i<=lastDate; i++) {
                const dateObj = new Date(year, month, i);
                const d = document.createElement('div'); d.className = 'day'; d.innerText = i;
                if(dateObj < today) d.classList.add('disabled');
                else {
                    if(dateObj.getTime() === today.getTime()) d.classList.add('today');
                    d.onclick = () => {
                        document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
                        d.classList.add('selected');
                        selDate = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                    };
                }
                grid.appendChild(d);
            }
        }
        function changeMonth(n) { currentMonth.setMonth(currentMonth.getMonth() + n); initCalendar(); }
        function selectTime(t, btn) { selTime = t; document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        
        function goToStep(n) {
            if (n === 2 && !selDate) return alert("날짜를 선택하세요.");
            if (n === 3 && !selTime) return alert("시간을 선택하세요.");
            document.getElementById('step-1').style.display = n === 1 ? 'block' : 'none';
            document.getElementById('step-2').style.display = n === 2 ? 'block' : 'none';
            document.getElementById('step-3').style.display = n === 3 ? 'block' : 'none';
            if (n === 3) {
                const course = document.getElementById('course_no').options[document.getElementById('course_no').selectedIndex].text;
                document.getElementById('final-check').innerHTML = `<h3>최종 확인</h3> 날짜: ${selDate}<br>장소: ${course}<br>시간: ${selTime.substring(0,5)}`;
            }
        }

        async function reserve() {
            const { error } = await _supabase.from('reservation').insert([{ mem_no: localStorage.getItem('mem_no'), course_no: document.getElementById('course_no').value, res_date: selDate, res_time: selTime }]);
            if (error) alert("실패: " + error.message); else { alert("예약 완료!"); location.reload(); }
        }

        async function fetchMyReservations() {
            const { data } = await _supabase.from('reservation').select('res_no, res_date, res_time, course(course_name)').eq('mem_no', localStorage.getItem('mem_no')).order('res_date', { ascending: true });
            const listDiv = document.getElementById('my-res-list');
            if (!data || data.length === 0) { listDiv.innerHTML = "내역 없음"; return; }
            listDiv.innerHTML = data.map(res => `<div class="res-item"><div><b>${res.res_date}</b> ${res.res_time.substring(0,5)}<br>${res.course.course_name}</div><button class="btn-cancel" onclick="cancelRes(${res.res_no})">취소</button></div>`).join('');
        }

        async function cancelRes(no) { if(confirm("취소?")) { await _supabase.from('reservation').delete().eq('res_no', no); fetchMyReservations(); } }
    </script>
</body>
</html>
