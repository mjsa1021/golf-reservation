<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경산시 파크골프 예약 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2e7d32; --accent: #ffa000; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #333; }
        .header { background: #fff; border-bottom: 1px solid #ddd; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.2rem; font-weight: bold; color: var(--primary); display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .main-banner { background: var(--primary); border-radius: 20px; padding: 30px; color: white; margin-bottom: 20px; }
        .btn-reserve-main { background: #fff; color: var(--primary); border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .menu-card { background: #fff; padding: 25px 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; }
        .section { display: none; }
        .active { display: block; }
        .content-card { background: #fff; border-radius: 20px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        input { width: 100%; padding: 15px; margin-top: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 20px; }
        .day { padding: 15px 5px; text-align: center; background: #f9f9f9; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .day.selected { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" onclick="goHome()">⛳ 경산시 파크골프</div>
        <div id="auth-status" class="user-info">
            <button onclick="showSection('auth-section')" style="border:none; background:none; font-weight:bold; cursor:pointer;">로그인</button>
        </div>
    </header>

    <div class="container">
        <div id="main-section" class="section active">
            <div class="main-banner">
                <h1>경산시 파크골프장<br>온라인 예약</h1>
                <p>간편하게 예약하고 이용하세요.</p>
                <button class="btn-reserve-main" onclick="checkLoginForReserve()">지금 예약하기 →</button>
            </div>
            <div class="grid-menu">
                <div class="menu-card" onclick="showSection('info-notice')"><i class="fas fa-bullhorn"></i><span>공지사항</span></div>
                <div class="menu-card" onclick="showSection('map-section')"><i class="fas fa-map-marked-alt"></i><span>구장찾기</span></div>
                <div class="menu-card" onclick="showSection('reserve-section')"><i class="fas fa-calendar-check"></i><span>예약확인</span></div>
            </div>
        </div>

        <div id="auth-section" class="section">
            <div class="content-card">
                <h2 id="auth-title">로그인</h2>
                <input type="text" id="user-id" placeholder="휴대폰 번호">
                <input type="password" id="user-pw" placeholder="비밀번호">
                <div id="signup-extra" style="display:none;">
                    <input type="text" id="user-name" placeholder="성함">
                    <input type="text" id="user-tel" placeholder="연락처">
                </div>
                <button onclick="handleAuth()" id="btn-auth-main" class="btn-primary">로그인 하기</button>
                <button onclick="toggleSignup()" class="btn-primary" style="background:#666;">회원가입 전환</button>
            </div>
        </div>

        <div id="reserve-section" class="section">
            <div class="content-card">
                <h2>날짜 선택</h2>
                <div class="calendar-grid" id="calendar-grid"></div>
                <button onclick="reserve()" class="btn-primary">예약 확정</button>
                <div style="margin-top:20px;">
                    <h3>내 예약 내역</h3>
                    <div id="my-res-list">내역이 없습니다.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://cxihknkegqjllaetliui.supabase.co', 'sb_publishable_GPYrYSU37rxlEG0DpKDFgA_oTwChTDK');
        let isSignupMode = false;
        let selDate = "";

        window.onload = () => { if(localStorage.getItem('mem_name')) loginUI(localStorage.getItem('mem_name')); };

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function goHome() { showSection('main-section'); }

        function toggleSignup() {
            isSignupMode = !isSignupMode;
            document.getElementById('auth-title').innerText = isSignupMode ? "회원가입" : "로그인";
            document.getElementById('signup-extra').style.display = isSignupMode ? "block" : "none";
        }

        async function handleAuth() {
            const id = document.getElementById('user-id').value;
            const pw = document.getElementById('user-pw').value;
            if(isSignupMode) {
                const name = document.getElementById('user-name').value;
                const tel = document.getElementById('user-tel').value;
                const { error } = await _supabase.from('member').insert([{ mem_id: id, mem_pw: pw, mem_name: name, mem_tel: tel }]);
                if(error) alert("실패: " + error.message); else location.reload();
            } else {
                const { data } = await _supabase.from('member').select('*').eq('mem_id', id).eq('mem_pw', pw).single();
                if(data) {
                    localStorage.setItem('mem_no', data.mem_no);
                    localStorage.setItem('mem_name', data.mem_name);
                    loginUI(data.mem_name);
                } else alert("로그인 실패");
            }
        }

        function loginUI(name) {
            document.getElementById('auth-status').innerHTML = `${name}님 | <span onclick="localStorage.clear();location.reload();">로그아웃</span>`;
            initCalendar();
            fetchRes();
            goHome();
        }

        function initCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            for(let i=1; i<=28; i++) {
                const d = document.createElement('div');
                d.className = 'day'; d.innerText = i;
                d.onclick = () => {
                    document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
                    d.classList.add('selected');
                    selDate = `2026-04-${String(i).padStart(2,'0')}`;
                };
                grid.appendChild(d);
            }
        }

        // [핵심 수정 부분] SQL 스키마에 맞춰 course_no -> court_name으로 변경
        async function reserve() {
            if(!selDate) return alert("날짜 선택!");
            const memNo = localStorage.getItem('mem_no');
            
            const { error } = await _supabase.from('reservation').insert([{ 
                mem_no: parseInt(memNo), 
                res_date: selDate, 
                court_name: '경산 파크골프장', // 이 부분이 SQL 스키마와 일치해야 함
                res_time: '09:00:00' 
            }]);

            if(error) alert("실패: " + error.message);
            else { alert("완료!"); fetchRes(); }
        }

        async function fetchRes() {
            const { data } = await _supabase.from('reservation').select('*').eq('mem_no', localStorage.getItem('mem_no'));
            if(data) document.getElementById('my-res-list').innerHTML = data.map(r => `<div>${r.res_date} 예약됨</div>`).join('');
        }

        function checkLoginForReserve() {
            if(localStorage.getItem('mem_no')) showSection('reserve-section');
            else { alert("로그인 필요"); showSection('auth-section'); }
        }
    </script>
</body>
</html>
