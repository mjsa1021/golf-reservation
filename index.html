<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경산시 골프 예약 센터</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f4; margin: 0; padding: 0; }
        .top-nav { background: #2e7d32; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-logo { font-size: 1.5rem; font-weight: bold; cursor: pointer; }
        .user-info { color: #ffeb3b; font-weight: bold; margin-right: 10px; }
        .center-content { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        /* 공지사항/안내 메뉴 버튼 (상시 노출) */
        .info-menu { display: flex; gap: 10px; margin-bottom: 20px; }
        .info-menu button { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #fff; border: 1px solid #2e7d32; color: #2e7d32; font-weight: bold; cursor: pointer; }

        .section { display: none; }
        .active { display: block; }

        .calendar-container, .auth-card, .info-card, .my-reservation-card { background: #fff; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day { padding: 20px 5px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; border: 1px solid #eee; text-align: center; }
        .day.selected { background-color: #2e7d32 !important; color: white !important; }
        
        input { font-size: 1.1rem; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 10px; border: 1px solid #ccc; margin-top: 8px; }
        .primary-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; background: #2e7d32; color: white; margin-top: 15px; }
        .secondary-btn { width: 100%; padding: 15px; border: 2px solid #2e7d32; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; background: #fff; color: #2e7d32; margin-top: 10px; }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="nav-logo" onclick="location.reload()">⛳ 경산시 골프 센터</div>
        <div class="nav-menu">
            <span id="user-display-name" class="user-info"></span>
            <span id="logout-btn" onclick="handleLogout()" style="display:none; color:#ffeb3b; cursor:pointer;">로그아웃</span>
        </div>
    </header>

    <main class="center-content">
        <div class="info-menu">
            <button onclick="showSection('info-notice')">📢 공지사항</button>
            <button onclick="showSection('info-guide')">📖 이용안내</button>
            <button onclick="checkLoginForReserve()" style="background:#2e7d32; color:#fff;">🗓️ 예약하기</button>
        </div>

        <div id="auth-section" class="section active">
            <div class="auth-card">
                <h2 id="auth-title" style="text-align:center;">로그인</h2>
                <input type="text" id="user-id" placeholder="휴대폰 번호 (아이디)">
                <input type="password" id="user-pw" placeholder="비밀번호">
                
                <div id="signup-extra" style="display: none;">
                    <input type="text" id="user-name" placeholder="성함">
                    <input type="text" id="user-tel" placeholder="연락처 (010-0000-0000)">
                </div>
                
                <button onclick="handleAuth()" id="btn-auth-main" class="primary-btn">로그인 하기</button>
                <button onclick="toggleSignup()" id="btn-signup-toggle" class="secondary-btn">회원가입 하러가기</button>
            </div>
        </div>

        <div id="info-notice" class="section">
            <div class="info-card">
                <h2>📢 공지사항</h2>
                <p>• 경산 파크골프장 잔디 보호 안내 (4월 말까지)</p>
                <p>• 불법 예약 대행 적발 시 이용이 영구 제한됩니다.</p>
                <button onclick="showSection('auth-section')" class="secondary-btn">닫기</button>
            </div>
        </div>

        <div id="info-guide" class="section">
            <div class="info-card">
                <h2>📖 이용안내</h2>
                <p><b>위치:</b> 경산시 남천면 일원</p>
                <p><b>비용:</b> 관내 거주자 무료 / 관외 5,000원</p>
                <button onclick="showSection('auth-section')" class="secondary-btn">닫기</button>
            </div>
        </div>

        <div id="reserve-section" class="section">
            <div class="calendar-container">
                <h3 id="current-month-display"></h3>
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>
            <button onclick="reserve()" class="primary-btn">선택한 날짜로 예약하기</button>
            
            <div class="my-reservation-card">
                <h3>나의 예약 현황</h3>
                <div id="my-res-list">로그인 후 확인 가능합니다.</div>
            </div>
        </div>
    </main>

    <script>
        // ⚠️ 중요: 본인의 Node.js 서버 주소로 수정하세요!
        const SERVER_URL = "http://localhost:3000"; 
        
        let isSignupMode = false;
        let selDate = "";

        // 페이지 로드 시 로그인 상태 확인
        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if(user) loginSuccess(user);
        };

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleSignup() {
            isSignupMode = !isSignupMode;
            document.getElementById('auth-title').innerText = isSignupMode ? "회원가입" : "로그인";
            document.getElementById('signup-extra').style.display = isSignupMode ? "block" : "none";
            document.getElementById('btn-auth-main').innerText = isSignupMode ? "가입 완료" : "로그인 하기";
        }

        // --- FETCH를 이용한 인증 로직 ---
        async function handleAuth() {
            const id = document.getElementById('user-id').value;
            const pw = document.getElementById('user-pw').value;
            
            const endpoint = isSignupMode ? "/api/signup" : "/api/login";
            const payload = isSignupMode ? {
                id, pw, name: document.getElementById('user-name').value, tel: document.getElementById('user-tel').value
            } : { id, pw };

            try {
                const res = await fetch(SERVER_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();

                if (res.ok) {
                    if (isSignupMode) {
                        alert("가입 성공! 로그인 해주세요.");
                        location.reload();
                    } else {
                        localStorage.setItem('user', JSON.stringify(result.user));
                        loginSuccess(result.user);
                    }
                } else {
                    alert("실패: " + result.message);
                }
            } catch (err) {
                alert("서버 연결 실패! node server.js를 켰는지 확인하세요.");
            }
        }

        function loginSuccess(user) {
            document.getElementById('user-display-name').innerText = user.name + " 님";
            document.getElementById('logout-btn').style.display = 'inline';
            showSection('reserve-section');
            initCalendar();
            fetchReservations(user.id);
        }

        function checkLoginForReserve() {
            if (localStorage.getItem('user')) showSection('reserve-section');
            else { alert("로그인이 필요합니다."); showSection('auth-section'); }
        }

        function handleLogout() { localStorage.clear(); location.reload(); }

        // 달력 및 예약 (fetch 적용)
        function initCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const now = new Date();
            document.getElementById('current-month-display').innerText = `${now.getFullYear()}년 ${now.getMonth()+1}월`;
            
            for(let i=1; i<=30; i++) {
                const d = document.createElement('div');
                d.className = 'day'; d.innerText = i;
                d.onclick = () => {
                    document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
                    d.classList.add('selected');
                    selDate = `2026-04-${String(i).padStart(2,'0')}`;
                };
                grid.appendChild(d);
            }
        }

        async function reserve() {
            const user = JSON.parse(localStorage.getItem('user'));
            if(!selDate) return alert("날짜를 선택하세요.");
            
            try {
                const res = await fetch(SERVER_URL + "/api/reserve", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: user.id, date: selDate })
                });
                if(res.ok) { alert("예약 완료!"); fetchReservations(user.id); }
            } catch(e) { alert("서버 통신 에러"); }
        }

        async function fetchReservations(userId) {
            try {
                const res = await fetch(`${SERVER_URL}/api/my-res?userId=${userId}`);
                const data = await res.json();
                const list = document.getElementById('my-res-list');
                list.innerHTML = data.length ? data.map(r => `<div>${r.date} 예약됨</div>`).join('') : "내역 없음";
            } catch(e) { console.log("내역 로드 실패"); }
        }
    </script>
</body>
</html>
