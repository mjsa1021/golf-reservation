<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경산시 파크골프 예약 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2e7d32; --accent: #ffa000; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #333; }
        .header { background: #fff; border-bottom: 1px solid #ddd; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.2rem; font-weight: bold; color: var(--primary); display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .main-banner { background: var(--primary); border-radius: 20px; padding: 30px; color: white; margin-bottom: 20px; position: relative; overflow: hidden; }
        .main-banner h1 { margin: 0; font-size: 1.5rem; }
        .main-banner p { opacity: 0.9; margin: 10px 0 20px; }
        .btn-reserve-main { background: #fff; color: var(--primary); border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .menu-card { background: #fff; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; border: 1px solid #eee; }
        .menu-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .menu-card span { font-weight: bold; font-size: 0.9rem; }
        .section { display: none; }
        .active { display: block; }
        .content-card { background: #fff; border-radius: 20px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .map-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .btn-map { background: #e3f2fd; color: #1976d2; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 15px; margin-top: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-secondary { width: 100%; padding: 15px; background: #fff; color: var(--primary); border: 2px solid var(--primary); border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 20px; }
        .day { padding: 15px 5px; text-align: center; background: #f9f9f9; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .day.selected { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" onclick="goHome()">⛳ 경산시 파크골프</div>
        <div id="auth-status" class="user-info">
            <button onclick="showSection('auth-section')" style="border:none; background:none; font-weight:bold; cursor:pointer;">로그인</button>
        </div>
    </header>

    <div class="container">
        <div id="main-section" class="section active">
            <div class="main-banner">
                <h1>경산시 파크골프장<br>온라인 예약 시스템</h1>
                <p>언제 어디서나 간편하게 예약하세요.</p>
                <button class="btn-reserve-main" onclick="checkLoginForReserve()">지금 예약하기 →</button>
            </div>
            <div class="grid-menu">
                <div class="menu-card" onclick="showSection('info-notice')"><span>공지사항</span></div>
                <div class="menu-card" onclick="showSection('info-guide')"><span>이용방법</span></div>
                <div class="menu-card" onclick="showSection('map-section')"><span>구장찾기</span></div>
            </div>
        </div>

        <div id="auth-section" class="section">
            <div class="content-card">
                <h2 id="auth-title" style="text-align:center;">로그인</h2>
                <input type="text" id="user-id" placeholder="휴대폰 번호 (아이디)">
                <input type="password" id="user-pw" placeholder="비밀번호">
                <div id="signup-extra" style="display:none;">
                    <input type="text" id="user-name" placeholder="성함">
                    <input type="text" id="user-tel" placeholder="연락처 (010-0000-0000)">
                </div>
                <button onclick="handleAuth()" id="btn-auth-main" class="btn-primary">로그인 하기</button>
                <button onclick="toggleSignup()" id="btn-signup-toggle" class="btn-secondary">회원가입 하러가기</button>
            </div>
        </div>

        <div id="map-section" class="section">
            <div class="content-card">
                <h2>구장 위치 및 길찾기</h2>
                <div style="width:100%; height:150px; background:#e0e0e0; border-radius:15px; margin-bottom:20px; display:flex; align-items:center; justify-content:center; color:#666;">
                    [ 지도 서비스 준비 중 ]
                </div>
                <div class="map-item">
                    <div><b>경산 파크골프장</b><br><small>경상북도 경산시 남천면</small></div>
                    <button class="btn-map" onclick="window.open('https://maps.google.com/?q=경산파크골프장')">길찾기</button>
                </div>
                <div class="map-item">
                    <div><b>하양 파크골프장</b><br><small>경상북도 경산시 하양읍</small></div>
                    <button class="btn-map" onclick="window.open('https://maps.google.com/?q=하양파크골프장')">길찾기</button>
                </div>
                <button onclick="goHome()" class="btn-secondary">홈으로 돌아가기</button>
            </div>
        </div>

        <div id="info-notice" class="section">
            <div class="content-card">
                <h2 style="color:var(--primary)">공지사항</h2>
                <hr style="border: 0; height: 1px; background: #eee; margin-bottom: 20px;">
                <p>• 2026년 4월 잔디 생육기 보호를 위한 일부 구장 휴장 안내</p>
                <p>• 예약 취소는 방문 1일 전까지만 가능합니다.</p>
                <button onclick="goHome()" class="btn-primary">확인</button>
            </div>
        </div>

        <div id="reserve-section" class="section">
            <div class="content-card">
                <h2>날짜 선택</h2>
                <div class="calendar-grid" id="calendar-grid"></div>
                <button onclick="reserve()" class="btn-primary">이 날짜로 예약 확정</button>
                <div style="margin-top:30px;">
                    <h3>나의 예약 현황</h3>
                    <div id="my-res-list" style="font-size:0.9rem; color:#666;">내역을 불러오는 중...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://cxihknkegqjllaetliui.supabase.co', 'sb_publishable_GPYrYSU37rxlEG0DpKDFgA_oTwChTDK');
        
        let isSignupMode = false;
        let selDate = "";

        window.onload = () => {
            const user = localStorage.getItem('mem_name');
            if(user) loginUI(user);
        };

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function goHome() { showSection('main-section'); }

        function toggleSignup() {
            isSignupMode = !isSignupMode;
            document.getElementById('auth-title').innerText = isSignupMode ? "회원가입" : "로그인";
            document.getElementById('signup-extra').style.display = isSignupMode ? "block" : "none";
            document.getElementById('btn-auth-main').innerText = isSignupMode ? "가입 완료" : "로그인 하기";
        }

        async function handleAuth() {
            const id = document.getElementById('user-id').value;
            const pw = document.getElementById('user-pw').value;

            if(isSignupMode) {
                const name = document.getElementById('user-name').value;
                const tel = document.getElementById('user-tel').value;
                const { error } = await _supabase.from('member').insert([{ mem_id: id, mem_pw: pw, mem_name: name, mem_tel: tel }]);
                if(error) alert("가입 실패: " + error.message); else { alert("가입 성공!"); location.reload(); }
            } else {
                const { data, error } = await _supabase.from('member').select('*').eq('mem_id', id).eq('mem_pw', pw).single();
                if(data) {
                    localStorage.setItem('mem_no', data.mem_no);
                    localStorage.setItem('mem_name', data.mem_name);
                    loginUI(data.mem_name);
                } else alert("로그인 실패: 아이디 또는 비밀번호를 확인하세요.");
            }
        }

        function loginUI(name) {
            document.getElementById('auth-status').innerHTML = `${name}님 | <span onclick="logout()" style="cursor:pointer; color:red;">로그아웃</span>`;
            initCalendar();
            fetchRes();
            goHome();
        }

        function logout() { localStorage.clear(); location.reload(); }

        function checkLoginForReserve() {
            if(localStorage.getItem('mem_no')) showSection('reserve-section');
            else { alert("로그인이 필요한 메뉴입니다."); showSection('auth-section'); }
        }

        function initCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            for(let i=1; i<=30; i++) {
                const d = document.createElement('div');
                d.className = 'day'; d.innerText = i;
                d.onclick = () => {
                    document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
                    d.classList.add('selected');
                    selDate = `2026-04-${String(i).padStart(2,'0')}`;
                };
                grid.appendChild(d);
            }
        }

        // [핵심 수정 부분]
        async function reserve() {
            if(!selDate) return alert("날짜를 선택하세요!");
            const memNo = localStorage.getItem('mem_no');
            
            // SQL 스키마에 맞춰 course_no -> court_name으로 변경하고 mem_no를 정수화함
            const { error } = await _supabase.from('reservation').insert([{ 
                mem_no: parseInt(memNo), 
                res_date: selDate, 
                court_name: '경산 파크골프장', 
                res_time: '09:00:00',
                status: '예약완료'
            }]);

            if(error) {
                alert("예약 실패: " + error.message);
            } else { 
                alert("예약 완료!"); 
                fetchRes(); 
            }
        }

        async function fetchRes() {
            const memNo = localStorage.getItem('mem_no');
            const { data, error } = await _supabase.from('reservation').select('*').eq('mem_no', memNo);
            
            const listDiv = document.getElementById('my-res-list');
            if(data && data.length > 0) {
                listDiv.innerHTML = data.map(r => `<div style="padding:5px 0; border-bottom:1px dashed #eee;">${r.res_date} (${r.court_name}) - ${r.status}</div>`).join('');
            } else {
                listDiv.innerText = "예약 내역이 없습니다.";
            }
        }
    </script>
</body>
</html>
