<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경산 실버 골프 예약 센터</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 1. 달력 헤더 정렬 수정 (년도와 월이 나란히 오도록) */
        .calendar-header { 
            display: flex; 
            justify-content: center; /* 가운데 정렬 */
            align-items: center; 
            gap: 30px; /* 버튼과 글자 사이 간격 */
            margin-bottom: 20px; 
            font-size: 1.8rem; 
            font-weight: bold; 
        }
        #current-month-display {
            display: inline-block;
            white-space: nowrap; /* 글자가 아래로 떨어지지 않게 방지 */
            text-align: center;
            min-width: 160px;
        }
        .calendar-header button {
            padding: 5px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #f9f9f9;
        }

        /* 기본 레이아웃 및 달력 그리드 */
        .calendar-container { background: #fff; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-label { font-weight: bold; padding: 10px; color: #666; font-size: 1.2rem; text-align: center; }
        .day { padding: 25px 10px; border-radius: 10px; cursor: pointer; font-size: 1.6rem; font-weight: bold; border: 2px solid #eee; text-align: center; }
        .day:hover:not(.disabled) { background-color: #e8f5e9; border-color: #2e7d32; }
        .day.selected { background-color: #2e7d32; color: white; border-color: #1b5e20; }
        .day.disabled { color: #ccc !important; background-color: #f9f9f9; cursor: not-allowed; }
        .day.today { border-color: #f57f17; color: #f57f17; border-width: 2px; }

        /* 2. 시간 버튼 디자인 수정 (상세 시간 표시 포함) */
        .time-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .time-btn { 
            padding: 15px 10px; 
            font-size: 1.4rem; 
            border: 3px solid #ddd; 
            border-radius: 12px; 
            background: white; 
            cursor: pointer; 
            font-weight: bold; 
            display: flex;
            flex-direction: column; /* 글자를 위아래로 배치 */
            align-items: center;
            gap: 5px;
        }
        .time-btn .time-detail { 
            font-size: 1rem; 
            font-weight: normal; 
            color: #666; 
        }
        .time-btn.active { background-color: #2e7d32; color: white; border-color: #1b5e20; }
        .time-btn.active .time-detail { color: #e8f5e9; }

        .big-label { font-size: 1.5rem; font-weight: bold; color: #333; display: block; margin: 20px 0 10px; }
        input, select { font-size: 1.3rem !important; padding: 15px !important; width: 100%; box-sizing: border-box; }
        .auth-card, .reserve-card { max-width: 500px; margin: 0 auto; }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="nav-logo" onclick="goHome()" style="cursor:pointer;">⛳ 경산 실버 예약 센터</div>
        <div class="nav-menu">
            <span onclick="checkMyReserve()">예약확인</span>
            <span onclick="showMyInfo()">내 정보</span>
            <span onclick="location.reload()" style="color:#ffeb3b;">로그아웃</span>
        </div>
    </header>

    <main class="center-content">
        <div id="auth-section">
            <h1 style="font-size: 2.5rem; text-align: center;">환영합니다</h1>
            <div class="auth-card">
                <div class="input-group">
                    <label class="big-label">휴대폰 번호</label>
                    <input type="text" id="user-id" placeholder="010-1234-5678">
                </div>
                <div class="input-group">
                    <label class="big-label">비밀번호</label>
                    <input type="password" id="user-pw" placeholder="비밀번호 입력">
                </div>
                <div id="signup-extra" style="display: none;">
                    <div class="input-group"><label class="big-label">비밀번호 확인</label><input type="password" id="user-pw-confirm"></div>
                    <div class="input-group"><label class="big-label">성함</label><input type="text" id="user-name"></div>
                    <div class="input-group"><label class="big-label">생년월일 (8자리)</label><input type="text" id="user-birth" placeholder="예: 19550101"></div>
                </div>
                <div class="button-group" style="margin-top: 30px;">
                    <button onclick="toggleSignup()" id="btn-signup-toggle" class="btn-join">처음 오셨나요? (회원가입)</button>
                    <button onclick="login()" id="btn-login-main" class="btn-login" style="margin-top: 10px;">로그인 하기</button>
                </div>
                <p onclick="showFindModal()" style="color: #666; cursor: pointer; text-decoration: underline; text-align: center; margin-top: 20px;">아이디/비밀번호 찾기</p>
            </div>
        </div>

        <div id="reserve-section" style="display: none;">
            <h1 style="font-size: 2.2rem; text-align: center;">날짜와 시간을 선택하세요</h1>
            
            <div class="calendar-container">
                <div class="calendar-header">
                    <button onclick="changeMonth(-1)">◀ 이전달</button>
                    <span id="current-month-display"></span>
                    <button onclick="changeMonth(1)">다음달 ▶</button>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>

            <div class="reserve-card">
                <label class="big-label">구장 선택</label>
                <select id="court">
                    <option value="경산 파크골프장">경산 파크골프장</option>
                </select>

                <label class="big-label">운영 시간 선택</label>
                <div class="time-btn-group">
                    <button class="time-btn" onclick="selectTime('오전반(09:00~12:00)', this)">
                        <span>오전반</span>
                        <span class="time-detail">(09:00 ~ 12:00)</span>
                    </button>
                    <button class="time-btn" onclick="selectTime('오후반(13:00~17:00)', this)">
                        <span>오후반</span>
                        <span class="time-detail">(13:00 ~ 17:00)</span>
                    </button>
                </div>

                <label class="big-label">인원 선택</label>
                <select id="people-count">
                    <option value="1">1명</option>
                    <option value="2">2명</option>
                    <option value="3">3명</option>
                    <option value="4">4명 (동반)</option>
                </select>
                <button onclick="reserve()" class="btn-login" style="margin-top: 40px; background: #2e7d32;">예약 신청하기</button>
            </div>

            <div id="result" class="summary-card" style="font-size: 1.4rem; padding: 20px; border: 2px solid #ddd; border-radius: 10px; margin-top: 20px; text-align: center; background-color: #f9f9f9;">
                <p>아직 예약된 정보가 없습니다.</p>
            </div>
        </div>

        <div id="find-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:30px; border:2px solid #2e7d32; border-radius:15px; z-index:1000; box-shadow: 0 0 20px rgba(0,0,0,0.3); width: 80%; max-width: 400px;">
            <h3 style="text-align: center;">내 정보 찾기</h3>
            <input type="text" id="find-name" placeholder="성함 입력" style="margin-bottom:10px;">
            <input type="text" id="find-birth" placeholder="생년월일 8자리" style="margin-bottom:10px;">
            <button onclick="findAccount()" class="btn-login">찾기 확인</button>
            <button onclick="closeFindModal()" style="margin-top:10px; width:100%; border:none; padding:10px; background:#ddd; border-radius:8px; cursor:pointer;">닫기</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
