<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경산 실버 골프 예약 센터</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 달력 및 어르신 맞춤형 추가 스타일 */
        .calendar-container { background: #fff; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 1.5rem; font-weight: bold; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .day-label { font-weight: bold; padding: 10px; color: #666; font-size: 1.2rem; }
        .day { 
            padding: 20px; border-radius: 10px; cursor: pointer; font-size: 1.4rem; font-weight: bold; border: 2px solid #eee; transition: 0.2s;
        }
        .day:hover:not(.disabled) { background-color: #e8f5e9; border-color: #2e7d32; }
        .day.selected { background-color: #2e7d32; color: white; border-color: #1b5e20; }
        .day.disabled { color: #ccc; background-color: #f9f9f9; cursor: not-allowed; border: none; }
        .day.today { border-color: #f57f17; color: #f57f17; }
        
        .time-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .time-btn { 
            padding: 20px; font-size: 1.3rem; border: 2px solid #ddd; border-radius: 10px; background: white; cursor: pointer; font-weight: bold;
        }
        .time-btn.active { background-color: #2e7d32; color: white; border-color: #2e7d32; }
        
        .big-label { font-size: 1.4rem; font-weight: bold; color: #333; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="nav-logo" onclick="goHome()">⛳ 경산 골프 예약 (통합)</div>
        <div class="nav-menu">
            <span onclick="checkMyReserve()">예약확인</span>
            <span onclick="showMyInfo()">내 정보</span>
            <span onclick="location.reload()" style="color:#ffeb3b;">로그아웃</span>
        </div>
    </header>

    <main class="center-content">
        <div id="auth-section">
            <h1 style="font-size: 2.5rem;">환영합니다</h1>
            <div class="auth-card">
                <div class="input-group">
                    <label class="big-label">휴대폰 번호</label>
                    <input type="text" id="user-id" style="font-size: 1.5rem; padding: 15px;" placeholder="010-1234-5678">
                </div>
                <div class="input-group">
                    <label class="big-label">비밀번호</label>
                    <input type="password" id="user-pw" style="font-size: 1.5rem; padding: 15px;" placeholder="비밀번호 입력">
                </div>

                <div id="signup-extra" style="display: none;">
                    <div class="input-group"><label class="big-label">비밀번호 확인</label><input type="password" id="user-pw-confirm"></div>
                    <div class="input-group"><label class="big-label">성함</label><input type="text" id="user-name"></div>
                    <div class="input-group"><label class="big-label">생년월일 (8자리)</label><input type="text" id="user-birth" placeholder="예: 19550101"></div>
                </div>

                <div class="button-group" style="margin-top: 20px;">
                    <button onclick="toggleSignup()" id="btn-signup-toggle" class="btn-join" style="font-size: 1.3rem; padding: 20px;">처음 왔습니다 (회원가입)</button>
                    <button onclick="login()" id="btn-login-main" class="btn-login" style="font-size: 1.3rem; padding: 20px; margin-top:10px;">로그인 하기</button>
                </div>
            </div>
        </div>

        <div id="reserve-section" style="display: none;">
            <h1 style="font-size: 2.2rem;">날짜와 시간을 골라주세요</h1>
            
            <div class="calendar-container">
                <div class="calendar-header">
                    <button onclick="changeMonth(-1)" style="font-size: 1.5rem; padding: 5px 15px;">◀ 이전달</button>
                    <span id="current-month-display">2026년 4월</span>
                    <button onclick="changeMonth(1)" style="font-size: 1.5rem; padding: 5px 15px;">다음달 ▶</button>
                </div>
                <div class="calendar-grid" id="calendar-grid">
                    </div>
            </div>

            <div class="reserve-card">
                <label class="big-label">골프장 선택</label>
                <select id="court" style="font-size: 1.3rem; padding: 15px; margin-bottom: 20px;">
                    <option>경산 인터불고 CC</option>
                    <option>경산 대구 CC</option>
                    <option>경산 파크골프장</option>
                </select>

                <label class="big-label">시간 선택 (고정제)</label>
                <div class="time-btn-group">
                    <button class="time-btn" onclick="selectTime('오전 09:00 ~ 12:00', this)">오전반<br>(09시~12시)</button>
                    <button class="time-btn" onclick="selectTime('오후 13:00 ~ 17:00', this)">오후반<br>(13시~17시)</button>
                </div>

                <label class="big-label" style="margin-top: 20px;">인원 선택</label>
                <select id="people-count" style="font-size: 1.3rem; padding: 15px;">
                    <option value="1">1명</option>
                    <option value="2">2명</option>
                    <option value="3">3명</option>
                    <option value="4">4명 (동반라운딩)</option>
                </select>

                <button onclick="reserve()" class="btn-login" style="margin-top: 30px; font-size: 1.5rem; padding: 25px; background: #2e7d32;">예약 신청하기</button>
            </div>

            <div class="summary-card" id="my-reservation-view">
                <h2 style="color:#f57f17; font-size: 1.8rem;">📝 나의 예약 내역</h2>
                <div id="result" class="summary-list" style="font-size: 1.3rem;">
                    <p>아직 예약된 정보가 없습니다.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
