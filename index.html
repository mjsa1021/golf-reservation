<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경산시 골프 예약 센터</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 글자 크기 조금 더 키웠습니다. */
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f4; margin: 0; padding: 0; }
        .calendar-header { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 20px; font-size: 1.8rem; font-weight: bold; }
        #current-month-display { display: inline-block; white-space: nowrap; text-align: center; min-width: 160px; }
        .calendar-header button { padding: 8px 20px; font-size: 1.2rem; cursor: pointer; border-radius: 8px; border: 1px solid #ddd; background: #fff; }
        .calendar-container { background: #fff; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-label { font-weight: bold; padding: 10px; color: #666; font-size: 1.2rem; text-align: center; }
        .day { padding: 25px 10px; border-radius: 10px; cursor: pointer; font-size: 1.6rem; font-weight: bold; border: 2px solid #eee; text-align: center; }
        .day:hover:not(.disabled) { background-color: #e8f5e9; border-color: #2e7d32; }
        .day.selected { background-color: #2e7d32; color: white; border-color: #1b5e20; }
        .day.disabled { color: #ccc !important; background-color: #f9f9f9; cursor: not-allowed; }
        .day.today { border-color: #f57f17; color: #f57f17; border-width: 2px; }
        .time-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .time-btn { padding: 15px 10px; font-size: 1.4rem; border: 3px solid #ddd; border-radius: 12px; background: white; cursor: pointer; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .time-btn.active { background-color: #2e7d32; color: white; border-color: #1b5e20; }
        .big-label { font-size: 1.5rem; font-weight: bold; color: #333; display: block; margin: 20px 0 10px; }
        input, select { font-size: 1.3rem !important; padding: 15px !important; width: 100%; box-sizing: border-box; border-radius: 10px; border: 1px solid #ccc; }
        .auth-card, .reserve-card, .info-card { max-width: 500px; margin: 0 auto; padding: 10px; }
        .step-indicator { text-align: center; margin-bottom: 20px; font-weight: bold; color: #2e7d32; font-size: 1.2rem; }
        .info-menu { display: flex; gap: 10px; margin: 20px auto; max-width: 500px; padding: 0 10px; }
        .info-menu button { flex:1; padding:15px; background:#fff; border:1px solid #2e7d32; border-radius:12px; font-weight:bold; font-size:1.1rem; color:#2e7d32; cursor:pointer; }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="nav-logo" onclick="goHome()" style="cursor:pointer;">⛳ 경산시 골프 예약 센터</div>
        <div class="nav-menu">
            <span onclick="checkMyReserve()">예약확인</span>
            <span onclick="showMyInfo()">내 정보</span>
            <span onclick="location.reload()" style="color:#ffeb3b; cursor:pointer;">로그아웃</span>
        </div>
    </header>

    <main class="center-content">
        <div class="info-menu" id="main-info-menu">
            <button onclick="goToInfo('guide')">구장안내</button>
            <button onclick="goToInfo('notice')">공지사항</button>
            <button onclick="goToInfo('cs')" style="background:#e8f5e9;">고객센터</button>
        </div>

        <div id="auth-section">
            <h1 style="font-size: 2.5rem; text-align: center;">반갑습니다!</h1>
            <div class="auth-card">
                <div class="input-group">
                    <label class="big-label">휴대폰 번호</label>
                    <input type="text" id="user-id" placeholder="010-1234-5678">
                </div>
                <div class="input-group">
                    <label class="big-label">비밀번호</label>
                    <input type="password" id="user-pw" placeholder="비밀번호 입력">
                </div>
                <div id="signup-extra" style="display: none;">
                    <div class="input-group"><label class="big-label">성함</label><input type="text" id="user-name"></div>
                    <div class="input-group"><label class="big-label">생년월일 (8자리)</label><input type="text" id="user-birth" placeholder="예: 19600101"></div>
                </div>
                <div class="button-group" style="margin-top: 30px;">
                    <button onclick="toggleSignup()" id="btn-signup-toggle" class="btn-join">처음 오셨나요? (회원가입)</button>
                    <button onclick="login()" id="btn-login-main" class="btn-login" style="margin-top: 10px;">로그인 하기</button>
                </div>
                <p onclick="showFindModal()" style="color: #666; cursor: pointer; text-decoration: underline; text-align: center; margin-top: 20px;">아이디/비밀번호 찾기</p>
            </div>
        </div>

        <div id="reserve-section" style="display: none;">
            <div id="step-1" class="reserve-step">
                <div class="step-indicator">1단계: 날짜 선택</div>
                <div class="calendar-container">
                    <div class="calendar-header">
                        <button onclick="changeMonth(-1)">◀ 이전달</button>
                        <span id="current-month-display"></span>
                        <button onclick="changeMonth(1)">다음달 ▶</button>
                    </div>
                    <div class="calendar-grid" id="calendar-grid"></div>
                </div>
                <button onclick="goToStep(2)" class="btn-login" style="background: #2e7d32; margin-top: 20px;">다음 단계로 넘어가기 ▶</button>
            </div>

            <div id="step-2" class="reserve-step" style="display: none;">
                <div class="step-indicator">2단계: 구장 및 시간 선택</div>
                <div class="reserve-card">
                    <label class="big-label">구장 선택</label>
                    <select id="court">
                        <option value="경산 파크골프장">경산 파크골프장</option>
                        <option value="하양 파크골프장">하양 파크골프장</option>
                    </select>
                    <label class="big-label">시간 선택</label>
                    <div class="time-btn-group">
                        <button class="time-btn" onclick="selectTime('오전반(09:00~12:00)', this)">오전 (09~12시)</button>
                        <button class="time-btn" onclick="selectTime('오후반(13:00~17:00)', this)">오후 (13~17시)</button>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 30px;">
                        <button onclick="goToStep(1)" style="flex: 1; background: #999;" class="btn-login">이전으로</button>
                        <button onclick="goToStep(3)" style="flex: 2; background: #2e7d32;" class="btn-login">다음으로 ▶</button>
                    </div>
                </div>
            </div>

            <div id="step-3" class="reserve-step" style="display: none;">
                <div class="step-indicator">3단계: 최종 확인</div>
                <div class="reserve-card">
                    <label class="big-label">방문 인원</label>
                    <select id="people-count">
                        <option value="1">1명 (본인)</option>
                        <option value="2">2명</option>
                        <option value="3">3명</option>
                        <option value="4">4명</option>
                    </select>
                    <div id="final-check" style="margin-top:20px; padding:20px; background:#f9f9f9; border:2px dashed #2e7d32; border-radius:15px;"></div>
                    <div style="display: flex; gap: 10px; margin-top: 30px;">
                        <button onclick="goToStep(2)" style="flex: 1; background: #999;" class="btn-login">이전으로</button>
                        <button onclick="reserve()" style="flex: 2; background: #e91e63;" class="btn-login">예약 완료하기 ✔️</button>
                    </div>
                </div>
            </div>

            <div id="result" style="display: none; padding: 25px; border: 3px solid #2e7d32; border-radius: 20px; margin: 20px auto; max-width: 450px; text-align: center; background: white;"></div>
        </div>

        <div id="info-section" style="display: none;">
            <div class="info-card">
                <div id="info-guide" class="info-content" style="display:none;">
                    <h1 style="color:#2e7d32; text-align:center;">구장 이용 안내</h1>
                    <div style="background:white; padding:40px; border-radius:15px; text-align:center; color:#999; border:1px solid #eee;">
                        내용을 준비 중입니다.
                    </div>
                </div>
                <div id="info-notice" class="info-content" style="display:none;">
                    <h1 style="color:#2e7d32; text-align:center;">공지사항</h1>
                    <div style="background:white; padding:40px; border-radius:15px; text-align:center; color:#999; border:1px solid #eee;">
                        등록된 공지사항이 없습니다.
                    </div>
                </div>
                <div id="info-cs" class="info-content" style="display:none;">
                    <h1 style="color:#e65100; text-align:center;">고객센터</h1>
                    <div style="background:white; padding:40px; border-radius:15px; text-align:center; color:#999; border:1px solid #eee;">
                        상담 전화번호를 준비 중입니다.
                    </div>
                </div>
                <button onclick="goHome()" style="width:100%; padding:15px; background:#2e7d32; color:white; border:none; border-radius:12px; font-size:1.2rem; font-weight:bold; cursor:pointer; margin-top:20px;">🏠 홈으로 가기 (처음 화면)</button>
            </div>
        </div>

        <div id="find-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:30px; border:2px solid #2e7d32; border-radius:15px; z-index:1000; width: 85%; max-width: 400px; box-shadow: 0 0 30px rgba(0,0,0,0.5);">
            <h2 style="text-align: center;">내 정보 찾기</h2>
            <input type="text" id="find-name" placeholder="성함 입력" style="margin-bottom:15px;">
            <input type="text" id="find-birth" placeholder="생년월일 8자리" style="margin-bottom:15px;">
            <button onclick="findAccount()" class="btn-login">찾아보기</button>
            <button onclick="closeFindModal()" style="margin-top:15px; width:100%; border:none; padding:10px; background:#eee; border-radius:10px;">창 닫기</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
